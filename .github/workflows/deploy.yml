name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout private repo
      - uses: actions/checkout@v4

      # 2. Install Node.js (for minification)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install minifiers
      - name: Install terser and csso
        run: |
          npm install -g terser csso-cli

      # 4. Prepare build folder
      - name: Minify files
        run: |
          mkdir build
          # Copy HTML as-is
          cp *.html build/
          # Minify JS
          for f in *.js; do terser "$f" -c -m -o "build/$f"; done
          # Minify CSS
          for f in *.css; do csso "$f" --output "build/$f"; done

      # 5. Clone public repo
      - name: Clone public repo
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/visitafrica21-dotcom/NextStop-Africa-Tours-Public.git out

      # 6. Copy minified build into public repo
      - name: Copy build to public repo
        run: |
          rm -rf out/*
          cp -r build/* out/

      # 7. Commit & push
      - name: Deploy
        run: |
          cd out
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy minified site" || echo "No changes to commit"
          git push