name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install minifiers
      - name: Install minifiers
        run: |
          npm install -g terser csso html-minifier

      # Prepare build folder
      - name: Minify files and copy assets
        run: |
          mkdir build
          # Minify HTML
          for f in *.html; do html-minifier "$f" -o "build/$f" --collapse-whitespace --remove-comments --minify-css true --minify-js true; done
          # Minify JS
          for f in *.js; do terser "$f" -c -m -o "build/$f"; done
          # Minify CSS
          for f in *.css; do csso "$f" --output "build/$f"; done
          # Copy images and other static assets
          cp -r images build/  # adjust folder name if different

      # Clone public repo
      - name: Clone public repo
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/visitafrica21-dotcom/NextStop-Africa-Tours-Public.git out

      # Copy build to public repo
      - name: Deploy
        run: |
          rm -rf out/*
          cp -r build/* out/
          cd out
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy minified site with images" || echo "No changes to commit"
          git push